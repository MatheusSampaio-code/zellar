<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Zellar Serviços</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{background:#f0f2f5;min-height:100vh}
nav{background:#0a1f5c;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #f0c040}
.logo{color:#f0c040;font-size:17px;font-weight:bold}
.nav-links a{color:#fff;text-decoration:none;font-size:11px;padding:4px 5px;border-radius:8px;margin-left:6px}
.nav-links a:hover{background:#f0c040;color:#0a1f5c}

#loginBox{max-width:380px;margin:80px auto;background:#fff;border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.15);text-align:center}
#loginBox h2{color:#0a1f5c;margin-bottom:20px;font-size:22px}
#loginBox input{width:100%;padding:13px;border:2px solid #eee;border-radius:10px;margin-bottom:15px;font-size:15px}
#loginBox input:focus{border-color:#0a1f5c;outline:none}
#loginBox button{width:100%;background:linear-gradient(135deg,#0a1f5c,#1a3a8c);color:#fff;padding:13px;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold}
#loginBox button:hover{background:#f0c040;color:#0a1f5c}
.erro{color:red;font-size:13px;margin-top:10px;display:none}

#painelAdmin{display:none;max-width:600px;margin:20px auto;padding:15px}
.card-admin{background:#fff;border-radius:16px;padding:25px;margin-bottom:20px;box-shadow:0 8px 25px rgba(0,0,0,0.08);border-left:4px solid #f0c040}
.card-admin h3{color:#0a1f5c;margin-bottom:20px;font-size:17px}
.card-admin input,.card-admin textarea,.card-admin select{width:100%;padding:11px;border:2px solid #eee;border-radius:10px;margin-bottom:12px;font-size:14px}
.card-admin input:focus,.card-admin textarea:focus{border-color:#0a1f5c;outline:none}
.btn-acao{background:linear-gradient(135deg,#0a1f5c,#1a3a8c);color:#fff;padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:bold;margin-right:8px}
.btn-acao:hover{background:#f0c040;color:#0a1f5c}
.btn-sair{background:#e74c3c;color:#fff;padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold}
.btn-sair:hover{background:#c0392b}
.item-lista{background:#f8f9ff;border-radius:10px;padding:12px 15px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.item-lista span{font-size:13px;color:#333}
.btn-del{background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px}
.msg{color:green;font-size:13px;margin-top:8px;display:none}
.header-admin{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.header-admin h2{color:#0a1f5c;font-size:20px}
</style>
</head>
<body>

<nav>
  <div class="logo">🧹 Zellar</div>
  <div class="nav-links">
    <a href="index.html">Início</a>
    <a href="servicos.html">Serviços</a>
    <a href="contato.html">Contato</a>
    <a href="admin.html">Admin</a>
  </div>
</nav>

<!-- LOGIN -->
<div id="loginBox">
  <div style="font-size:50px;margin-bottom:15px">🔐</div>
  <h2>Área Administrativa</h2>
  <p style="color:#888;font-size:14px;margin-bottom:25px">Zellar Serviços</p>
  <input type="text" id="usuarioInput" placeholder="Usuário">
  <div style="position:relative">
    <input type="password" id="senhaInput" placeholder="Senha" id="senhaInput">
    <span onclick="toggleSenha()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px">👁</span>
  </div>
  <button onclick="fazerLogin()">Entrar</button>
  <p class="erro" id="erro">❌ Usuário ou senha incorretos!</p>
</div>

<!-- PAINEL -->
<div id="painelAdmin">
  <div class="header-admin">
    <h2>⚙️ Painel Admin</h2>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>

  <!-- Editar preços existentes -->
  <div class="card-admin">
    <h3>💰 Editar Preço de Serviço</h3>
    <select id="servicoSelect">
      <option value="">Selecione o serviço...</option>
      <option>🏠 Limpeza Residencial - 4 horas</option>
      <option>🏠 Limpeza Residencial - 6 horas</option>
      <option>🏠 Limpeza Residencial - 8 horas</option>
      <option>🏠 Limpeza Residencial - Pacote mensal</option>
      <option>👕 Passadoria - 4 horas</option>
      <option>👕 Passadoria - 6 horas</option>
      <option>👩‍🍳 Cozinheira - 4 horas</option>
      <option>👩‍🍳 Cozinheira - Mensal 8h</option>
      <option>❄️ Ar-Condicionado - Split até 12k BTUs</option>
      <option>❄️ Ar-Condicionado - Split 18k-24k BTUs</option>
      <option>🏊 Piscina - Até 25m²</option>
      <option>🏊 Piscina - 26m² a 50m²</option>
      <option>🏊 Piscina - Contrato mensal</option>
      <option>🚗 Estética - Lavagem Ecológica</option>
      <option>🚗 Estética - Higienização Interna</option>
      <option>🚗 Estética - Higien. + Ar-Cond.</option>
      <option>🚗 Estética - Polimento Comercial</option>
    </select>
    <input type="text" id="novoPreco" placeholder="Novo valor (ex: R$ 200,00)">
    <button class="btn-acao" onclick="salvarPreco()">💾 Salvar Preço</button>
    <p class="msg" id="msgPreco">✅ Preço atualizado!</p>
  </div>

  <!-- Adicionar serviço extra -->
  <div class="card-admin">
    <h3>➕ Adicionar Serviço Extra</h3>
    <input type="text" id="nomeServico" placeholder="Nome do serviço">
    <input type="text" id="valorServico" placeholder="Valor (ex: R$ 150,00)">
    <textarea id="descServico" placeholder="Descrição do serviço" rows="3"></textarea>
    <button class="btn-acao" onclick="adicionarServico()">➕ Adicionar</button>
    <p class="msg" id="msgAdd">✅ Serviço adicionado!</p>
  </div>

  <!-- Lista de serviços extras -->
  <div class="card-admin">
    <h3>📋 Serviços Extras Cadastrados</h3>
    <div id="listaServicos"><p style="color:#888;font-size:13px">Carregando...</p></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHOnmbsKftrblC0-0vxL-U1OUONkT7bXs",
  authDomain: "zellar-servicos.firebaseapp.com",
  projectId: "zellar-servicos",
  storageBucket: "zellar-servicos.firebasestorage.app",
  messagingSenderId: "130833028955",
  appId: "1:130833028955:web:e966c2442eb9ffd9feac7e",
  measurementId: "G-CBF7R981PY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const USUARIO = "zellar";
const SENHA = "zellar153566*";

window.toggleSenha = function(){
  const s = document.getElementById("senhaInput");
  s.type = s.type === "password" ? "text" : "password";
}

window.fazerLogin = function(){
  const u = document.getElementById("usuarioInput").value;
  const s = document.getElementById("senhaInput").value;
  if(u === USUARIO && s === SENHA){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("painelAdmin").style.display = "block";
    carregarServicos();
  } else {
    document.getElementById("erro").style.display = "block";
  }
}

window.sair = function(){
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("painelAdmin").style.display = "none";
  document.getElementById("usuarioInput").value = "";
  document.getElementById("senhaInput").value = "";
}

window.salvarPreco = async function(){
  const servico = document.getElementById("servicoSelect").value;
  const preco = document.getElementById("novoPreco").value;
  if(!servico || !preco){ alert("Preencha todos os campos!"); return; }
const id = servico.trim();
  
  await setDoc(doc(db, "precos", id), { servico, preco, atualizado: new Date().toISOString() });
  const msg = document.getElementById("msgPreco");
  msg.style.display = "block";
  setTimeout(()=> msg.style.display = "none", 3000);
  document.getElementById("novoPreco").value = "";
}

window.adicionarServico = async function(){
  const nome = document.getElementById("nomeServico").value;
  const valor = document.getElementById("valorServico").value;
  const desc = document.getElementById("descServico").value;
  if(!nome || !valor){ alert("Preencha nome e valor!"); return; }
  await addDoc(collection(db, "servicos_extras"), { nome, valor, desc, criado: new Date().toISOString() });
  const msg = document.getElementById("msgAdd");
  msg.style.display = "block";
  setTimeout(()=> msg.style.display = "none", 3000);
  document.getElementById("nomeServico").value = "";
  document.getElementById("valorServico").value = "";
  document.getElementById("descServico").value = "";
  carregarServicos();
}

async function carregarServicos(){
  const lista = document.getElementById("listaServicos");
  const snap = await getDocs(collection(db, "servicos_extras"));
  if(snap.empty){ lista.innerHTML = '<p style="color:#888;font-size:13px">Nenhum serviço extra cadastrado.</p>'; return; }
  lista.innerHTML = "";
  snap.forEach(d => {
    const item = document.createElement("div");
    item.className = "item-lista";
    item.innerHTML = `<span><b>${d.data().nome}</b> — ${d.data().valor}<br><small>${d.data().desc}</small></span>
    <button class="btn-del" onclick="deletarServico('${d.id}')">🗑</button>`;
    lista.appendChild(item);
  });
}

window.deletarServico = async function(id){
  if(!confirm("Remover este serviço?")) return;
  await deleteDoc(doc(db, "servicos_extras", id));
  carregarServicos();
}

document.addEventListener("keydown", e => {
  if(e.key === "Enter" && document.getElementById("loginBox").style.display !== "none") window.fazerLogin();
});
</script>

</body>
</html>
